<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a1a">
  <title>Reports | AI Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="bg-gradient"></div>
  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>

  <!-- Password Gate -->
  <div id="password-overlay" class="password-overlay">
    <div class="password-box">
      <img src="../assets/img/logo.png" alt="AI Solutions">
      <h2 id="client-name">—</h2>
      <p>Introduza o código de acesso para consultar o report.</p>
      <form id="password-form">
        <input type="password" id="password-input" placeholder="Código de acesso" autocomplete="off">
        <button type="submit">Aceder ao Report</button>
        <div id="password-error" class="password-error"></div>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" style="display:none">
    <header class="header">
      <div class="header-left">
        <img src="../assets/img/logo.png" alt="AI Solutions">
        <h1 id="dashboard-title">—</h1>
        <span class="badge">Report</span>
      </div>
      <div class="period-controls">
        <div class="period-selector">
          <button class="period-btn" data-period="7d">7D</button>
          <button class="period-btn" data-period="15d">15D</button>
          <button class="period-btn active" data-period="30d">30D</button>
          <button class="period-btn" data-period="this-month">Este Mês</button>
          <button class="period-btn" data-period="last-month">Mês Anterior</button>
          <button class="period-btn" data-period="custom" id="custom-btn">Personalizado</button>
        </div>
        <div class="custom-range" id="custom-range" style="display:none">
          <input type="date" id="date-start" class="date-input">
          <span class="date-sep">—</span>
          <input type="date" id="date-end" class="date-input">
          <button class="date-apply" id="date-apply">Aplicar</button>
        </div>
      </div>
    </header>

    <main class="container" id="dashboard-content">
      <div class="loading">
        <div class="spinner"></div>
        A carregar dados...
      </div>
    </main>

    <footer class="footer">
      Powered by AI Solutions &mdash; Dados em tempo real
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script src="../assets/js/config.js?v=17"></script>
  <script src="../assets/js/utils.js?v=17"></script>
  <script src="../assets/js/api.js?v=17"></script>
  <script src="../assets/js/charts.js?v=17"></script>
  <script src="../assets/js/mock.js?v=17"></script>
  <script src="../assets/js/dashboard.js?v=17"></script>
  <script src="../assets/js/auth.js?v=17"></script>
  <script>
    const origInit = initDashboard;
    initDashboard = function(slug) {
      document.getElementById('dashboard-title').textContent = CLIENTS[slug]?.name || '';
      return origInit(slug);
    };
  </script>
</body>
</html>
